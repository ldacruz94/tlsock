name: tlsock - CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: install libssl-dev
      run: sudo apt-get update && sudo apt-get install -y libssl-dev
    - name: Generate test certs
      run: |
        mkdir -p certs
        openssl req -x509 -newkey rsa:2048 -keyout certs/key.pem -out certs/cert.pem -days 365 -nodes -subj "/CN=localhost" -addext "subjectAltName=IP:127.0.0.1"
        openssl req -x509 -newkey rsa:2048 -keyout certs/other_key.pem -out certs/other_cert.pem -days 365 -nodes -subj "/CN=other"
    - name: make build
      run: make build
    - name: make test
      run: make test
    
